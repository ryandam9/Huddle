name: Android

# Builds the debug APK (and runs analyze + tests) on CI, where Google's
# Android repositories are reachable. This is the environment that can actually
# exercise the Gradle `assembleDebug` step.
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # AGP/Gradle and the project's Kotlin/Java config target JDK 17.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: huddle-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
