name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - run: flutter pub get
      - run: flutter analyze
      # --concurrency=1 keeps the socket/discovery tests fully isolated on CI.
      - run: flutter test --concurrency=1
